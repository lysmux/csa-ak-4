limit: 10000

memory_size:
  instruction: 1000
  data: 1000

stack_size:
  ret: 1000
  data: 1000

io:
  outputs:
    default:
      mode: string
      address: 0x222
      default: true
    debug:
      mode: raw
      address: 0x224
      default: false
  inputs:
    keyboard:
      address: 0x223
      vector: 0
      schedule:
        - [1, h]
        - [100, e]
        - [200, l]
        - [250, l]
        - [1000, o]
