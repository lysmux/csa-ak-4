name: long_arithmetic
source: |-
  fun main() {
      var a: long = 5000000000;
      var b: long = 3000000000;
      print(a + b);               // DADD: 8_000_000_000
      print(a - b);               // DSUB: 2_000_000_000

      var x: long = 100000;
      var y: long = 100000;
      print(x * y);               // DMUL: 10_000_000_000

      var big: long = 10000000000;
      print(big / y);             // DDIV: 100_000
  }
