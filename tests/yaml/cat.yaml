name: cat
source: |-
  var done: bool = false;

  interrupt 0 on_char() {
      var c: int = read();
      if (c == 0) {
          done = true;
      } else {
          print(char_output, c);
      }
  }

  fun main() {
      enable_interrupts();
      while (!done) {}
      disable_interrupts();
  }
