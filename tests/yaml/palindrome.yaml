name: palindrome
source: |-
  fun reverse(int n): int {
      var rev: int = 0;
      while (n > 0) {
          rev = rev * 10 + n - n / 10 * 10;
          n = n / 10;
      }
      return rev;
  }

  fun is_palindrome(int n): bool {
      return reverse(n) == n;
  }

  fun main(): int {
      var max_pal: int = 0;
      var i: int = 10;
      while (i <= 99) {
          var j: int = i;
          while (j <= 99) {
              var product: int = i * j;
              if (product > max_pal) {
                  if (is_palindrome(product)) {
                      max_pal = product;
                  }
              }
              j++;
          }
          i++;
      }
      print(max_pal);
      return max_pal;
  }
