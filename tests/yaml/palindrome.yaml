name: palindrome
source: |-
  var digits: int  = 0;
  var done:   bool = false;

  interrupt 0 on_digits() {
      digits = read();
      done = true;
  }

  fun reverse(int n): int {
      var rev: int = 0;
      while (n > 0) {
          rev = rev * 10 + n - n / 10 * 10;
          n = n / 10;
      }
      return rev;
  }

  fun is_palindrome(int n): bool {
      return reverse(n) == n;
  }

  fun main() {
      enable_interrupts();
      while (!done) {}
      disable_interrupts();

      var lo: int = 1;
      var k: int = 1;
      while (k < digits) {
          lo = lo * 10;
          k++;
      }
      var hi: int = lo * 10 - 1;

      var max_pal: int = 0;
      var i: int = hi;
      while (i >= lo) {
          var j: int = hi;
          while ((j >= i) && (i * j > max_pal)) {
              if (is_palindrome(i * j)) {
                  max_pal = i * j;
              }
              j--;
          }
          i--;
      }
      print(max_pal);
  }
