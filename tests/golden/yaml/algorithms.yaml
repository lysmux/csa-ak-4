name: algorithms
source: |-
  fun fact(int n): int {
      if (n <= 1) {
          return 1;
      }
      return n * fact(n - 1);
  }

  fun gcd(int a, int b): int {
      while (b != 0) {
          var t: int = b;
          b = a - a / b * b;   // a % b
          a = t;
      }
      return a;
  }

  fun main() {
      print(fact(5));      // recursion       -> 120
      print(gcd(48, 36));  // loop + modulo    -> 12

      var sum: int = 0;
      var i: int = 1;
      while (i <= 5) {
          sum = sum + i;
          i++;             // postfix increment
      }
      print(sum);          // 1+2+3+4+5        -> 15
  }
