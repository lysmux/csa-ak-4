name: cat
source: |-
  var done: bool = false;

  interrupt 0 on_char() {
      var c: int = read();
      if (c == 0) {
          done = true;
      } else {
          print(char_output, c);
      }
  }

  fun main() {
      enable_interrupts();
      while (!done) {}
      disable_interrupts();
  }
max_trace: 60
config:
  limit: 2000
  memory_size:
    instruction: 2000
    data: 1000
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      char_output:
        mode: string
        address: 546
        default: true
      int_output:
        mode: raw
        address: 548
        default: false
    inputs:
      stdin:
        address: 547
        vector: 0
        schedule:
        - - 1
          - 72
        - - 150
          - 105
        - - 300
          - 10
        - - 450
          - 0
