name: cat
source: |-
  interrupt 0 on_char() {
      print(char_output, read());
  }

  fun main() {
      enable_interrupts();
      while (true) {}
  }
max_trace: 60
config:
  limit: 2000
  memory_size:
    instruction: 500
    data: 500
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      char_output:
        format: string
        address: 546
        default: true
      int_output:
        format: raw
        address: 548
        default: false
    inputs:
      stdin:
        address: 547
        vector: 0
        schedule:
        - - 1
          - 72
        - - 50
          - 105
        - - 100
          - 10
