name: cat
source: |-
  interrupt 0 on_char() {
      print(char_output, getchar());
  }

  fun main() {
      enable_interrupts();
      while (true) {}
  }
config:
  limit: 2000
  memory_size:
    instruction: 500
    data: 500
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      char_output:
        format: string
        address: 546
        default: true
      int_output:
        format: raw
        address: 548
    inputs:
      stdin:
        address: 547
        vector: 0
        schedule:
        - - 1
          - H
        - - 50
          - i
        - - 100
          - '

            '
max_trace: 60
expected_output:
