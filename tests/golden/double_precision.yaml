name: double_precision
source: |-
  // 64-битное сложение двух 32-битных пар (hi, lo).
  //
  // ADDC (add with carry) добавляет к сумме двух слов перенос C,
  // оставшийся от предыдущей операции ADD. Это стандартный приём
  // реализации расширенной арифметики без аппаратной поддержки 64-бит.
  //
  // Пример:
  //   A = (a_hi=0, a_lo=0xFFFFFFFF) = 2^32 - 1 = 4294967295
  //   B = (b_hi=0, b_lo=0x00000001) = 1
  //   A + B = (1, 0) = 2^32
  //
  // Инструкции:
  //   sum_lo = a_lo + b_lo      -- ADD: 0xFFFFFFFF + 1 = 0, флаг C = 1
  //   sum_hi = addc(a_hi, b_hi) -- ADDC: 0 + 0 + C = 1

  fun main() {
      var a_hi: int = 0;
      var a_lo: int = 0xFFFFFFFF;
      var b_hi: int = 0;
      var b_lo: int = 1;

      var sum_lo: int = a_lo + b_lo;
      var sum_hi: int = addc(a_hi, b_hi);

      print(int_output, sum_hi);
      print(int_output, sum_lo);
  }
config:
  limit: 5000
  memory_size:
    instruction: 500
    data: 500
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      char_output:
        kind: char
        address: 546
      int_output:
        kind: int
        address: 548
max_trace: 200
expected_output:
  char_output: ''
  int_output:
  - 1
  - 0
