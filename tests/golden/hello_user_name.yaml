name: hello_user_name
source: |-
  var name:     int[8];
  var name_len: int  = 0;
  var done:     bool = false;

  interrupt 0 on_char() {
      var c: int = getchar();
      if (c == 10) {
          done = true;
      } else {
          name[name_len] = c;
          name_len++;
      }
  }

  fun main() {
      print(char_output, "What is your name? ");
      enable_interrupts();
      while (!done) {}
      disable_interrupts();
      print(char_output, "Hello, ");
      var i: int = 0;
      while (i < name_len) {
          print(char_output, name[i]);
          i++;
      }
      print(char_output, "!\n");
  }
config:
  limit: 100000
  memory_size:
    instruction: 500
    data: 500
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      char_output:
        kind: char
        address: 546
      int_output:
        kind: int
        address: 548
    inputs:
      stdin:
        address: 547
        vector: 0
        schedule:
        - - 500
          - B
        - - 1000
          - o
        - - 1500
          - b
        - - 2000
          - '

            '
max_trace: 80
expected_output:
