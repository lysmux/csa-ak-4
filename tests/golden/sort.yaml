name: sort
source: |-
  // Пузырьковая сортировка.
  // Формат ввода: числа как байты (1–255), терминатор: 0x00.

  const CAPACITY: int = 5;

  var nums:  int[5];
  var count: int  = 0;
  var done:  bool = false;

  interrupt 0 on_num() {
      var c: int = read();
      if (c == 0) {
          done = true;
      } else {
          nums[count] = c;
          count++;
      }
  }

  fun bubble_sort() {
      var pass: int = 0;
      while (pass < CAPACITY) {
          var j: int = 0;
          while (j < CAPACITY - 1) {
              if (nums[j] > nums[j + 1]) {
                  var tmp: int = nums[j];
                  nums[j]      = nums[j + 1];
                  nums[j + 1]  = tmp;
              }
              j++;
          }
          pass++;
      }
  }

  fun main() {
      enable_interrupts();
      while (!done) {}
      disable_interrupts();
      bubble_sort();
      var i: int = 0;
      while (i < count) {
          print(nums[i]);
          i++;
      }
  }
