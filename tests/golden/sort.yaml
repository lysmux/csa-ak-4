  limit: 500000
  memory_size:
    instruction: 500
    data: 500
  stack_size:
    ret: 100
    data: 100
  io:
    outputs:
      default:
        format: raw
        address: 548
        default: true
    inputs:
      stdin:
        address: 547
        vector: 0
        schedule:
        - - 100
          - "\x05"
        - - 200
          - "\x03"
        - - 300
          - "\b"
        - - 400
          - "\x01"
        - - 500
          - "\x04"
        - - 600
          - "\0"
